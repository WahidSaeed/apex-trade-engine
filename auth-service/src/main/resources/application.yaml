server:
  port: 8081

spring:
  main:
    web-application-type: servlet
  application:
    name: AUTH-SERVICE
  
  datasource:
    url: jdbc:postgresql://localhost:5432/apextrade_db?currentSchema=auth_schema
    username: apextrader
    password: apextrader
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: auth_schema
    create-schemas: true

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/
    instance:
      prefer-ip-address: true # Better for Docker/Local environments
      lease-renewal-interval-in-seconds: 5 # Faster heartbeats for your dev testing

  management:
      tracing:
        sampling:
          probability: 1.0 # Capture every request (good for testing in Berlin)
      zipkin:
        tracing:
          endpoint: "http://localhost:9411/api/v2/spans"
      endpoints:
        web:
          exposure:
            include: health, info, tracing # Expose tracing via Actuator

security:
  jwt:
    secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    expiration: 3600000 # 1 hour in milliseconds