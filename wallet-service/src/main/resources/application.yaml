server:
  port: 8083

spring:
  application:
    name: WALLET-SERVICE
  datasource:
    url: jdbc:postgresql://localhost:5432/apextrade_db?currentSchema=wallet_schema
    username: apextrader
    password: apextrader
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: wallet_schema
    create-schemas: true
  
  kafka:
      bootstrap-servers: localhost:9092
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
        properties:
          spring.json.add.type.headers: true
      consumer:
        group-id: wallet-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
        properties:
          spring.json.trusted.packages: "com.apextrade.dto.kafka"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true # Better for Docker/Local environments
    lease-renewal-interval-in-seconds: 5 # Faster heartbeats for your dev testing

management:
  tracing:
    sampling:
      probability: 1.0 # Capture every request (good for testing in Berlin)
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health, info, tracing # Expose tracing via Actuator