server:
  port: 8081

spring:
  application:
    name: AUTH-SERVICE
  datasource:
    url: jdbc:postgresql://localhost:5432/apextrade_db?currentSchema=auth_schema
    username: apextrader
    password: apextrader
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    default-schema: auth_schema

# THESE MUST BE AT THE TOP LEVEL (NOT UNDER SPRING)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true # REQUIRED for /actuator/info to work
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: "health,info,tracing"

security:
  jwt:
    secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    expiration: 3600000