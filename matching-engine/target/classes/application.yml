spring:
  application:
    name: matching-engine
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: matching-engine-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.apextrade.dto.kafka"

  management:
    tracing:
      sampling:
        probability: 1.0 # Capture every request (good for testing in Berlin)
    zipkin:
      tracing:
        endpoint: "http://localhost:9411/api/v2/spans"
    endpoints:
      web:
        exposure:
          include: health, info, tracing # Expose tracing via Actuator